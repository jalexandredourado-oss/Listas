<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Nossa Lista de Compras</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .product-card:active { transform: scale(0.92); }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20 min-h-screen">

  <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
    
    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-slate-100 shadow-sm px-4 py-3.5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-emerald-600 text-white p-2.5 rounded-2xl shadow-md"><i data-lucide="shopping-bag" class="w-5 h-5"></i></div>
        <div>
          <h1 class="font-extrabold text-slate-900 text-base">A Nossa Lista</h1>
          <p class="text-[10px] text-slate-400 flex items-center gap-1" id="connection-subtitle"><span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span> Sincronização Ativa</p>
        </div>
      </div>
      <button onclick="openProfileModal()" class="bg-slate-100 text-slate-600 p-2 rounded-xl hover:bg-slate-200"><i data-lucide="user" class="w-4 h-4"></i></button>
    </header>

    <main class="px-4 pt-4 flex-1">
      
      <!-- ABAS -->
      <div class="bg-white p-1 rounded-2xl border border-slate-200 shadow-xs mb-5 flex gap-1">
        <button id="btn-tab-shelves" onclick="switchMainTab('shelves')" class="flex-1 py-3 text-xs font-bold rounded-xl flex items-center justify-center gap-2 bg-emerald-600 text-white">
          <i data-lucide="layout-grid" class="w-4 h-4"></i> Abastecer
        </button>
        <button id="btn-tab-list" onclick="switchMainTab('list')" class="flex-1 py-3 text-xs font-bold rounded-xl flex items-center justify-center gap-2 text-slate-500">
          <i data-lucide="shopping-cart" class="w-4 h-4"></i> Lista
        </button>
      </div>

      <!-- ABA 1: ABASTECER -->
      <div id="tab-content-shelves" class="space-y-4 animate-fade-in">
        <section class="bg-white rounded-3xl p-4 shadow-xs border border-slate-100">
          <input type="text" placeholder="Pesquisar produtos..." class="w-full bg-slate-50 border rounded-2xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500" oninput="handleSearchInput(this.value)">
          <div id="search-results-grid" class="grid grid-cols-3 gap-2 mt-2.5 hidden"></div>
        </section>
        <section class="bg-white rounded-3xl p-4 shadow-xs border border-slate-100">
          <div id="shelf-category-tabs" class="flex gap-2 overflow-x-auto pb-3 scrollbar-none"></div>
          <div class="grid grid-cols-3 gap-2.5 mt-2" id="shelf-products-grid"></div>
        </section>
      </div>

      <!-- ABA 2: LISTA -->
      <div id="tab-content-list" class="hidden animate-fade-in space-y-4">
        <div id="list-items-container" class="bg-white rounded-3xl border border-slate-100 p-4"></div>
      </div>

      <!-- BLOCO DE SINCRONIZAÇÃO (INTEGRADO) -->
      <section class="bg-white rounded-3xl p-5 shadow-xs border border-slate-100 mt-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-sm">Sincronização</h3>
          <span class="text-xl font-black text-slate-800" id="list-id-display">------</span>
        </div>
        <div class="flex gap-2">
          <button onclick="copyCode()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3 rounded-2xl text-xs">Copiar Código</button>
          <button onclick="openShareAppModal()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-2xl text-xs">Partilhar</button>
        </div>
      </section>

    </main>
  </div>

  <script type="module">
    // Lógica principal mantida
    window.switchMainTab = function(tabId) {
      ['shelves', 'list'].forEach(id => {
        const content = document.getElementById(`tab-content-${id}`);
        const btn = document.getElementById(`btn-tab-${id}`);
        if (id === tabId) {
          content.classList.remove('hidden');
          btn.className = "flex-1 py-3 text-xs font-bold rounded-xl flex items-center justify-center gap-2 bg-emerald-600 text-white";
        } else {
          content.classList.add('hidden');
          btn.className = "flex-1 py-3 text-xs font-bold rounded-xl flex items-center justify-center gap-2 text-slate-500";
        }
      });
    };
    window.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
